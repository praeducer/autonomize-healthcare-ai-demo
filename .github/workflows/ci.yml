name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/prior_auth_demo/ tests/

      - name: Format check
        run: ruff format --check src/prior_auth_demo/ tests/

      - name: Type check
        run: mypy src/prior_auth_demo/

      - name: Test
        run: pytest -v
