name: CI

on:
  # Manual-only during rapid development (Steps 1-3).
  # Run from GitHub Actions tab → "Run workflow" button.
  # Automated triggers (push/PR) will be enabled in Step 4 (Azure deploy).
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/prior_auth_demo/ tests/

      - name: Format check
        run: uv run ruff format --check src/prior_auth_demo/ tests/

      - name: Type check
        run: uv run mypy src/prior_auth_demo/

      - name: Unit tests
        run: uv run pytest -v -m unit

      - name: Data quality tests
        run: uv run pytest -v -m unit tests/test_data_quality.py
