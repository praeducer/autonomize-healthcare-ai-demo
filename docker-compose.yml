services:
  fhir-server:
    image: hapiproject/hapi:v7.6.0
    container_name: hapi-fhir-demo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # HAPI FHIR application settings
      hapi.fhir.default_encoding: json
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.bulk_export_enabled: "false"
      hapi.fhir.narrative_enabled: "false"
      # JVM tuning for demo workload — HAPI FHIR is a Spring Boot Java app
      # 1GB heap is sufficient for 10-patient Synthea dataset with fast startup
      JAVA_TOOL_OPTIONS: >-
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:+UseStringDeduplication
    # Health check: HAPI v7.6.0 is a distroless image (no curl/wget/sh).
    # Verify from host: curl -sf http://localhost:8080/fhir/metadata
    # Spring Boot startup takes ~15-30s; restart policy handles crashes.
    # Resource limits — prevent runaway JVM from starving the demo host
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g
          cpus: "0.5"
    # Named volume for persistent H2 database across container restarts
    # Synthea data survives `docker compose down` / `docker compose up`
    volumes:
      - hapi-fhir-data:/data/hapi

volumes:
  hapi-fhir-data:
    name: hapi-fhir-demo-data
